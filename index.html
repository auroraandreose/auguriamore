<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Per te 💌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #fff8f5 0%, #f8efe9 100%);
      color: #4a3a35;
      display: flex; justify-content: center; align-items: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 520px; background: rgba(255,255,255,0.92);
      border-radius: 24px; padding: 32px 24px; box-shadow: 0 12px 35px rgba(0,0,0,0.08);
      text-align: center;
    }
    .emoji { font-size: 2rem; margin-bottom: 10px; }
    h1 { font-size: 1.8rem; margin-bottom: 14px; }
    .text { font-size: 1rem; line-height: 1.6; color: #6a5751; margin-bottom: 22px; }
    .section { display: none; animation: fadeIn 0.5s ease; }
    .section.active { display: block; }
    .box {
      background: #fff5f1; border: 1px solid #f1d6cb; border-radius: 18px;
      padding: 18px; margin: 16px 0; line-height: 1.6;
    }
    .final {
      background: #fdf3e7; border: 1px solid #ecd7bb; border-radius: 18px;
      padding: 20px; margin: 18px 0; line-height: 1.7;
    }
    button {
      background: #b96f5d; color: white; border: none; padding: 12px 20px;
      font-size: 1rem; border-radius: 999px; cursor: pointer;
      transition: transform 0.2s ease;
    }
    button:hover { transform: translateY(-2px); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">

    <div id="step1" class="section active">
      <div class="emoji">💌</div>
      <h1>Ho una sorpresa per te</h1>
      <p class="text">Clicca qui sotto ↓</p>
      <button onclick="nextStep(2)">Vai</button>
    </div>

    <div id="step2" class="section">
      <div class="emoji">🍇</div>
      <h1>Indizio</h1>
      <div class="box">
        Colline, vino e relax.
      </div>
      <button onclick="nextStep(3)">Avanti</button>
    </div>

    <div id="step3" class="section">
      <div class="emoji">📍</div>
      <h1>Dove?</h1>
      <div class="box">
        Toscana, Chianti.
      </div>
      <button onclick="nextStep(4)">Scopri</button>
    </div>

    <div id="step4" class="section">
      <div class="emoji">🍷</div>
      <h1>Sorpresa</h1>
      <div class="final">
        Degustazione di vini alla <strong>Podere Bucine Winery</strong> 🍷<br><br>
        + notte alla <strong>Torre nel Chianti</strong> (a 3 minuti di macchina)<br>
        con colazione inclusa ☀️
      </div>
      <button onclick="restart()">Ricomincia</button>
    </div>

  </div>

  <script>
    function nextStep(step) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
    }
    function restart() { nextStep(1); }
  </script>
</body>
</html>
